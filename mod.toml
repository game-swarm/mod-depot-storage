[meta]
name = "depot-storage"
version = "0.1.0"
description = "Depot and global storage system — resource storage, cargo transit, and per-room depot for Swarm"
author = "Swarm Team"

[dependencies]

[config]
depot_capacity = { type = "u32", default = 10000, description = "Maximum storage per depot" }
depot_hits = { type = "u32", default = 5000, description = "Minimum hit points for depot structures" }
repair_range = { type = "u32", default = 1, description = "Depot repair range in tiles" }
repair_capacity = { type = "u32", default = 5, description = "Depot repair capacity per tick" }

[compatibility]
engine_abi_min = "1.0"
